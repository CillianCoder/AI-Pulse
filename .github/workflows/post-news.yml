# .github/workflows/ai-news-bot.yml
name: AI News Bot

on:
  schedule:
    - cron: '0 12,17,22 * * *' # UTC times ~ 8AM, 1PM, 6PM ET
  workflow_dispatch: # Allows manual trigger

jobs:
  post-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run AI News Bot
        run: node bot.js
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          PAGE_TOKEN: ${{ secrets.PAGE_TOKEN }}
          NEWS_KEY: ${{ secrets.NEWS_KEY }}
